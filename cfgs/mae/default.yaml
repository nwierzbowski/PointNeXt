# MAE Training default config
# Base training hyperparameters for PointNeXt MAE

# Dataset
dataset:
  common:
    NAME: TBODataset
    data_dir: './data/tbo'
    in_channels: 6
  train:
    split: train
    num_points: 1024
    split_ratio: 0.8
  val:
    split: test
    num_points: 1024
    split_ratio: 0.8

num_points: 1024

# No transforms needed - data is already preprocessed
datatransforms:
  train: []
  val: []
  kwargs: {}

# DataLoader
batch_size: 32
val_batch_size: 32
dataloader:
  num_workers: 4

# Training
lr: 0.001
optimizer:
  NAME: 'adamw'
  weight_decay: 0.05

sched: cosine
epochs: 300
warmup_epochs: 10
min_lr: 1.0e-5
t_max: 250

grad_norm_clip: 10
step_per_update: 1

# No classification criterion needed for MAE
criterion_args:
  NAME: None

# Model
model:
  NAME: PointNextMAE
  encoder_args:
    NAME: PointNextEncoder
    blocks: [1, 1, 1, 1, 1, 1]
    strides: [1, 2, 2, 2, 2, 1]
    width: 32
    in_channels: 6
    sa_layers: 2
    sa_use_res: True
    radius: 0.15
    radius_scaling: 1.5
    nsample: 32
    expansion: 4
    aggr_args:
      feature_type: 'dp_fj'
      reduction: 'max'
    group_args:
      NAME: 'ballquery'
      normalize_dp: True
    conv_args:
      order: conv-norm-act
    act_args:
      act: 'relu'
    norm_args:
      norm: 'bn'
  mask_ratio: 0.8
  subsample: 'fps'
  group: 'knn'
  group_size: 32
  sample_ratio: 0.25
  radius: 0.1
  decoder_dim: 256

# Validation
val_freq: 5
print_freq: 10

# IO
log_dir: 'mae_training'
root_dir: './logs'
pretrained_path: null

# Disable wandb by default
wandb:
  use_wandb: false
  project: PointNeXt-MAE

# Misc
seed: 42
deterministic: false
mode: train
